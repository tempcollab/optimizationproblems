name: verify certificate

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run exact rational interval verifier
        run: python3 scripts/verify_42a_certificate.py

      - name: Run exact rational interval verifier with optimized Python
        run: python3 -O scripts/verify_42a_certificate.py

      - name: Run numerical sanity check
        run: |
          python3 -m pip install mpmath
          python3 scripts/numeric_sanity_check.py

      - name: Regenerate certificate files
        run: python3 scripts/export_42a_certificate.py

      - name: Check certificate files are reproducible
        run: git diff --exit-code certificate
